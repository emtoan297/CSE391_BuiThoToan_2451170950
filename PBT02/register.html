<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản E-Commerce</title>
</head>
<body>

    <h1>ĐĂNG KÝ TÀI KHOẢN</h1>

    <form action="#" method="POST">

        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <p>
                <label for="fullname">Họ tên:</label><br>
                <input type="text" id="fullname" name="fullname" 
                       required minlength="2" maxlength="50" placeholder="Nhập họ và tên">
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" 
                       required placeholder="vi-du@gmail.com">
            </p>

            <p>
                <label for="phone">Số điện thoại:</label><br>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" placeholder="Nhập 10 chữ số">
            </p>

            <p>
                <label for="dob">Ngày sinh:</label><br>
                <input type="date" id="dob" name="dob" max="2026-04-24">
            </p>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <p>
                
                <label for="username">Username:</label><br>
                <input type="text" id="username" name="username" 
                       pattern="^[a-zA-Z0-9_]{3,20}$" placeholder="Chữ, số hoặc _ (3-20 ký tự)">
                
            </p>
            <!-- <p>
                <input type="text" name="" id=""
                pattern="(?=.*[A-Z])(?=)">
            </p> -->
            <p>
                <label for="password">Password:</label><br>
                <input type="password" id="password" name="password" 
                       minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" 
                       placeholder="Ít nhất 1 chữ hoa, 1 số">
            </p>

            <p>
                <label for="confirm_password">Xác nhận password:</label><br>
                <input type="password" id="confirm_password" name="confirm_password" 
                       minlength="8" placeholder="Nhập lại mật khẩu">
            </p>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <p>
                <label for="city">Thành phố:</label><br>
                <select id="city" name="city">
                    <option value="">-- Chọn thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </p>

            <p>
                <label for="district">Quận/Huyện:</label><br>
                <select id="district" name="district">
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận 2</option>
                    <option value="badinh">Ba Đình</option>
                </select>
            </p>

            <p>
                <label for="address">Địa chỉ chi tiết:</label><br>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </p>

            <p>
                Giới tính:<br>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Nam</label>
                
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Nữ</label>
                
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Khác</label>
            </p>
        </fieldset>

        <p>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">Tôi đồng ý với điều khoản dịch vụ</label>
        </p>

        <button type="submit">Đăng ký ngay</button>
        <button type="reset">Xóa làm lại</button>

    </form>

</body>
</html>
