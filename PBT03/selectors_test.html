<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        h1 {
            color: red;
        }
        .price {
            color: green;
        }
        #app header {
            background-color: #0bed2d;
            color: rgb(213, 11, 11);
            padding: 10px;
        }
        nav a:first-child  {
            color: rgb(238, 7, 215);
        }
         .product.featured h2 {
            color: blue;
        }
        article > p{
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }
         a[href="/"]  {
            font-size: 30px;
        }
        .top-bar.dark h1 {
            font-size: 10px;
        }

    </style>
    <title>Document</title>
</head>
<body>
    <div id="app">
    <header class="top-bar dark">
        <h1>ShopTLU</h1>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/products">Products</a>
            <a href="/about">About</a>
        </nav>
    </header>
    <main>
        <article class="product">
            <h2>iPhone 16</h2>
            <p class="price">25.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
        <article class="product featured">
            <h2>MacBook Pro</h2>
            <p class="price">45.990.000đ</p>
            <p>Mô tả sản phẩm...</p>
        </article>
    </main>
</div>
</body>
</html>
