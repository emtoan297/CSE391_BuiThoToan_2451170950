<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu Sản phẩm Multimedia</title>
</head>
<body>

    <header>
        <svg width="100" height="100">
            <circle cx="50" cy="50" r="40" fill="cyan" />
        </svg>
        <h1>Chào mừng đến với cửa hàng Công nghệ</h1>
    </header>
    <main>
        <section>
            <h2>Sản phẩm nổi bật</h2>

            <figure>
                <img src="https://picsum.photos/id/1/600/400" 
                     alt="Laptop cao cấp màu bạc, màn hình hiển thị code" 
                     style="max-width: 100%; height: auto;" 
                     width="600" height="400">
                <figcaption>Laptop Pro 2026 - Hiệu năng cực đỉnh</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/id/160/600/400" 
                     alt="Điện thoại thông minh chụp ảnh từ phía trước" 
                     style="max-width: 100%; height: auto;" 
                     width="600" height="400" 
                     loading="lazy">
                <figcaption>Smartphone X - Chụp ảnh xuyên đêm</figcaption>
            </figure>

            <figure>
                <img src="https://picsum.photos/id/48/600/400" 
                     alt="Tai nghe chụp tai không dây màu đen" 
                     style="max-width: 100%; height: auto;" 
                     width="600" height="400" 
                     loading="lazy">
                <figcaption>Headphone S - Âm thanh sống động</figcaption>
            </figure>
        </section>

        <section>
            <h2>Video Review (YouTube)</h2>
            <iframe width="560" height="315" 
                    src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                    title="YouTube video player" 
                    loading="lazy"
                    allowfullscreen>
            </iframe>
        </section>

        <section>
            <h2>Video giới thiệu chi tiết</h2>
            <video width="640" height="360" controls poster="https://picsum.photos/id/2/640/360">
                <source src="https://www.w3schools.com/html/mov_bbb.webm" type="video/webm">
            
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </section>

        <section>
            <h2>Nhạc nền giới thiệu</h2>
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            </audio>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Trang web Multimedia đơn giản</p>
    </footer>

</body>
</html>
