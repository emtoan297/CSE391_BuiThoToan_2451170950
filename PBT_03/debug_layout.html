<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Debug Layout - Bui Tho Toan</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>
    <h1>Sửa lỗi vỡ Layout (Container 960px)</h1>

    <h2>Cách 1: Dùng Border-box (Khuyên dùng)</h2>
    <div class="container fix-1">
        <div class="sidebar">Sidebar 300px</div>
        <div class="content">Content 660px</div>
    </div>

    <div style="clear: both; margin-top: 50px;"></div>

    <h2>Cách 2: Tính toán thủ công (Content-box)</h2>
    <div class="container fix-2">
        <div class="sidebar-manual">Sidebar (Đã trừ padding)</div>
        <div class="content-manual">Content (Đã trừ padding)</div>
    </div>
</body>
</html>
