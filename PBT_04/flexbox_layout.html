<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTT - Flexbox Layout</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">BTT LOGO</div>
        
        <nav class="menu-items">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
        </nav>

        <div class="auth-buttons">
            <button class="btn">Login</button>
            <button class="btn">Register</button>
        </div>
    </header>

    <main class="container">
        <h2 style="margin: 20px 0; text-align: center;">Danh sách sản phẩm</h2>
        <div class="product-grid">
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Product">
                <div class="card-info">
                    <h4>Sản phẩm IT 01</h4>
                    <p class="price">1.500.000đ</p>
                </div>
                <button class="buy-btn">Mua</button>
            </div>

            <div class="card">
                <img src="https://placehold.co/200x150" alt="Product">
                <div class="card-info">
                    <h4>Sản phẩm IT 02</h4>
                    <p class="price">2.200.000đ</p>
                </div>
                <button class="buy-btn">Mua</button>
            </div>

            <div class="card">
                <img src="https://placehold.co/200x150" alt="Product">
                <div class="card-info">
                    <h4>Sản phẩm IT 03</h4>
                    <p class="price">800.000đ</p>
                </div>
                <button class="buy-btn">Mua</button>
            </div>

            <div class="card">
                <img src="https://placehold.co/200x150" alt="Product">
                <div class="card-info">
                    <h4>Sản phẩm IT 04</h4>
                    <p class="price">3.500.000đ</p>
                </div>
                <button class="buy-btn">Mua</button>
            </div>

            <div class="card"><img src="https://placehold.co/200x150"> <div class="card-info"><h4>SP 05</h4><p class="price">1.000.000đ</p></div> <button class="buy-btn">Mua</button> </div>
            <div class="card"><img src="https://placehold.co/200x150"> <div class="card-info"><h4>SP 06</h4><p class="price">900.000đ</p></div> <button class="buy-btn">Mua</button> </div>
            <div class="card"><img src="https://placehold.co/200x150"> <div class="card-info"><h4>SP 07</h4><p class="price">5.000.000đ</p></div> <button class="buy-btn">Mua</button> </div>
            <div class="card"><img src="https://placehold.co/200x150"> <div class="card-info"><h4>SP 08</h4><p class="price">7.000.000đ</p></div> <button class="buy-btn">Mua</button> </div>
        </div>
    </main>

</body>
</html>
