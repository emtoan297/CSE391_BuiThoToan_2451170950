<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập Positioning</title>
    <link rel="stylesheet" href="positioning.css">
</head>
<body>
    <header class="header">
        <h2>BTT Store</h2>
        <nav>
            <a href="#home">Trang chủ</a>
            <a href="#products">Sản phẩm</a>
            <a href="#info">Thông tin</a>
        </nav>
    </header>

    <aside class="sidebar">
        <h3>Lọc linh kiện</h3>
        <label><input type="checkbox"> Laptop Gaming</label>
        <label><input type="checkbox"> Bàn phím cơ</label>
        <label><input type="checkbox"> Chuột không dây</label>
    </aside>

    <main class="main" id="top-page">
        <h2>Danh mục sản phẩm</h2>
        <div class="container-card">
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Product">
                <div class="badge">HOT</div>
                <h4>Laptop Dell XPS</h4>
                <p>25.000.000đ</p>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150" alt="Product">
                <h4>VGA RTX 3060</h4>
                <p>8.500.000đ</p>
            </div>
            <div class="card">
                <img src="https://placehold.co/200x150 " alt="Product">
                <div class="badge">HOT</div>
                <h4>RAM 16GB DDR5</h4>
                <p>1.800.000đ</p>
            </div>
            <div class="card"><img src="https://placehold.co/200x150" alt="Product"><h4>SSD 500GB</h4><p>1.200.000đ</p></div>
            <div class="card"><img src="https://placehold.co/200x150" alt="Product"><h4>Màn hình 24 inch</h4><p>3.000.000đ</p></div>
        </div>
    </main>

    <button class="scroll-top">
        <a href="#top-page">↑</a>
    </button>
</body>
</html>
